<!DOCTYPE html>
<html>
<head>
    <title>HDI Prediction</title>
</head>
<body>

    <h2>HDI Prediction App</h2>

    <form action="/predict" method="post">
        Life Expectancy: <input type="text" name="life"><br><br>
        Education Index: <input type="text" name="edu"><br><br>
        Income Index: <input type="text" name="income"><br><br>

        <input type="submit" value="Predict">
    </form>

    <br>

    {% if prediction_text %}
        <h3>{{ prediction_text }}</h3>
    {% endif %}

</body>
</html>
