<!DOCTYPE html>
<html>
<head>
    <title>HDI Prediction</title>
</head>
<body>

    <h1>Human Development Index</h1>

    <form action="/predict" method="POST">

        <input type="number" step="any" name="continent" placeholder="Continent (1-5)" required><br><br>
        <input type="number" step="any" name="gdp" placeholder="GDP" required><br><br>
        <input type="number" step="any" name="life" placeholder="Life Expectancy" required><br><br>
        <input type="number" step="any" name="education" placeholder="Education Index" required><br><br>

        <button type="submit">Predict</button>
    </form>

    <br>

    {% if prediction_text %}
        <h2>{{ prediction_text }}</h2>
    {% endif %}

</body>
</html>
