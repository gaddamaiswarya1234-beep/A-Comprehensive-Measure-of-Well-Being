<!DOCTYPE html>
<html>
<head>
    <title>HDI Prediction</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
            padding: 40px;
        }

        h1 {
            color: black;
        }

        input {
            padding: 10px;
            margin: 5px;
            width: 220px;
        }

        button {
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            border: none;
            cursor: pointer;
        }

        h2 {
            color: green;
        }
    </style>
</head>

<body>

    <h1>Human Development Index</h1>

    <form action="/predict" method="POST">

        <input type="number" step="any" name="continent" placeholder="Continent (1-5)" required><br>
        <input type="number" step="any" name="gdp" placeholder="GDP" required><br>
        <input type="number" step="any" name="life" placeholder="Life Expectancy" required><br>
        <input type="number" step="any" name="education" placeholder="Education Index" required><br>

        <button type="submit">Predict</button>
    </form>

    <br>

    {% if prediction_text %}
        <h2>{{ prediction_text }}</h2>
    {% endif %}

</body>
</html>
